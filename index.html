<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta Sarasa</title>
    <style>
        :root { --bg: #1a252f; --card: #2c3e50; --primary: #e74c3c; --accent: #f1c40f; --text: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--accent); font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); width: 100%; max-width: 500px; margin-top: 20px; position: relative; }
        .screen { display: none; }
        .active { display: block; }
        button { background-color: var(--primary); color: white; border: none; padding: 15px 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 8px; margin: 10px 5px; transition: transform 0.1s, background 0.3s; width: 90%; }
        button:hover { background-color: #c0392b; transform: scale(1.02); }
        button:disabled { background-color: #7f8c8d; cursor: not-allowed; transform: none; }
        .btn-secondary { background-color: #3498db; }
        .btn-secondary:hover { background-color: #2980b9; }
        .btn-host-mode { background: transparent; border: 1px solid #7f8c8d; color: #7f8c8d; font-size: 0.8rem; width: auto; padding: 5px 10px; margin-top: 20px; }
        .btn-host-mode:hover { background: rgba(127,140,141,0.2); transform: none; }
        input { padding: 15px; font-size: 1.2rem; border-radius: 8px; border: 2px solid #34495e; background: #ecf0f1; color: #2c3e50; margin: 10px; width: 85%; text-align: center; font-weight: bold; outline: none; }
        .room-tag { position: absolute; top: 10px; right: 15px; font-weight: bold; color: var(--accent); display: none; }
        .timer { font-size: 2rem; font-weight: bold; color: var(--accent); border: 4px solid var(--accent); border-radius: 50%; width: 60px; height: 60px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        ul { list-style: none; padding: 0; font-size: 1.2rem; }
        li { background: rgba(255,255,255,0.1); padding: 8px; margin: 5px 0; border-radius: 8px; }
        li span:last-child { float: right; color: var(--accent); font-weight: bold; }

        /* ── Prompt cards (answering phase) ── */
        .prompt-card { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; margin: 10px 0; text-align: left; }
        .prompt-text { font-weight: bold; margin-bottom: 10px; font-size: 1.1rem; color: var(--accent); }
        .prompt-card input { width: calc(100% - 30px); margin: 0; }
        .prompt-card input:disabled { background: #bdc3c7; color: #7f8c8d; cursor: not-allowed; }

        /* Retract button */
        #btn-retract-answers { background-color: #8e44ad; display: none; }
        #btn-retract-answers:hover { background-color: #732d91; }

        /* ── Unified answer card ──
           Used for both "preview-only" cards (can't vote) and "vote" cards (can vote).
           The modifier classes change color and interactivity. */
        .answer-card {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background: rgba(0,0,0,0.25);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 13px 16px;
            margin: 8px 0;
            font-style: italic;
            font-size: 1.08rem;
            text-align: left;
            color: var(--text);
            transition: border-color 0.2s, background 0.2s, opacity 0.2s, transform 0.1s;
            cursor: default;
        }

        /* Votable card — green tint, pointer cursor, hover effect */
        .answer-card.votable {
            background: rgba(39,174,96,0.15);
            border-color: rgba(39,174,96,0.5);
            cursor: pointer;
            /* reset the global button styles that bleed in */
            font-weight: normal;
            font-family: inherit;
            font-size: 1.08rem;
            width: 100%;
            padding: 13px 16px;
            border-radius: 10px;
            margin: 8px 0;
        }
        .answer-card.votable:hover:not(:disabled) {
            background: rgba(39,174,96,0.28);
            border-color: #27ae60;
            transform: scale(1.01);
        }
        .answer-card.votable:disabled {
            cursor: not-allowed;
            transform: none;
        }

        /* After the player has voted: highlight chosen, dim others */
        .answer-card.voted-chosen {
            border-color: var(--accent) !important;
            background: rgba(241,196,15,0.15) !important;
            opacity: 1 !important;
        }
        .answer-card.voted-other {
            opacity: 0.35;
        }

        #vote-wait-msg { color: var(--accent); font-weight: bold; padding: 10px; display: none; }

        /* ── Result cards (vote result screen) ── */
        .result-card {
            background: rgba(0,0,0,0.25);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 14px 16px;
            margin: 10px 0;
            text-align: left;
            position: relative;
        }
        .result-card.is-winner {
            border-color: var(--accent);
            background: rgba(241,196,15,0.1);
        }
        .result-card.is-jinx {
            border-color: #e74c3c;
            background: rgba(231,76,60,0.1);
        }

        /* Badge row sits above the answer text */
        .result-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 9px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: bold;
            font-style: normal;
            white-space: nowrap;
        }
        .badge-author  { background: rgba(52,152,219,0.25); border: 1px solid #3498db; color: #85c1e9; }
        .badge-votes   { background: rgba(39,174,96,0.25);  border: 1px solid #27ae60; color: #82e0aa; }
        .badge-points  { background: rgba(241,196,15,0.2);  border: 1px solid var(--accent); color: var(--accent); }
        .badge-sarasa  { background: rgba(231,76,60,0.25);  border: 1px solid #e74c3c; color: #f1948a; }
        .badge-nobody  { background: rgba(127,140,141,0.2); border: 1px solid #7f8c8d; color: #aab7b8; }

        .result-answer-text {
            font-style: italic;
            font-size: 1.08rem;
            line-height: 1.4;
        }
        .result-voters {
            margin-top: 7px;
            font-size: 0.82rem;
            color: #bdc3c7;
        }

        /* ── Between-round leaderboard (reuses screen-vote-result) ── */
        #result-round-header {
            display: none;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 15px;
        }
        #result-round-scores { display: none; }
        #result-round-scores li { display: flex; justify-content: space-between; padding: 10px 14px; }
    </style>
</head>
<body>

    <h1>🧉 Alta Sarasa</h1>
    <div id="timer-container" style="display:none;"><div class="timer" id="global-timer">--</div></div>

    <div class="container">
        <div id="room-display-tag" class="room-tag">SALA: ----</div>

        <!-- HOME -->
        <div id="screen-home" class="screen active">
            <input type="text" id="player-name" placeholder="Tu Nombre" maxlength="15">
            <input type="text" id="join-code" placeholder="CÓDIGO DE SALA" maxlength="4" style="text-transform: uppercase;">
            <button class="btn-secondary" onclick="joinGame()">Unirse a Partida</button>
            <button class="btn-host-mode" onclick="toggleHostView()">Activar Modo Anfitrión</button>
            <div id="host-setup" style="display:none; margin-top: 10px;">
                <button onclick="createGame()">Crear Nueva Sala</button>
            </div>
        </div>

        <!-- LOBBY -->
        <div id="screen-lobby" class="screen">
            <h2>Sala de Espera</h2>
            <div id="lobby-code-big" style="font-size: 2rem; color: var(--accent); margin-bottom: 15px;">----</div>
            <p>Jugadores:</p>
            <ul id="player-list"></ul>
            <div id="host-controls" style="display: none;">
                <button onclick="startGame()">¡Arrancar!</button>
            </div>
        </div>

        <!-- ANSWERING -->
        <div id="screen-answering" class="screen">
            <h2 id="answering-title">Completá la frase:</h2>
            <div id="prompts-container"></div>
            <button id="btn-submit-answers" onclick="submitAnswers()">Enviar Sarasa</button>
            <button id="btn-retract-answers" onclick="retractAnswers()">✏️ Cambiar respuesta</button>
        </div>

        <!-- VOTING -->
        <div id="screen-voting" class="screen">
            <h2 id="voting-title">Votación</h2>
            <div id="vote-prompt-text" style="font-weight: bold; margin-bottom: 12px;"></div>
            <!-- JS renders either votable buttons OR read-only preview cards here, never both -->
            <div id="voting-cards"></div>
            <div id="vote-wait-msg">Esperando a los demás... 🍵</div>
        </div>

        <!-- VOTE RESULT (also hosts between-round leaderboard) -->
        <div id="screen-vote-result" class="screen">
            <h2 id="vote-result-title">Resultados</h2>
            <div id="result-round-header"></div>
            <ul id="result-round-scores"></ul>
            <div id="result-prompt-text" style="font-style: italic; margin-bottom: 15px;"></div>
            <div id="result-details"></div>
        </div>

        <!-- FINAL SCORES -->
        <div id="screen-scores" class="screen">
            <h2>Posiciones Finales 🏆</h2>
            <ul id="final-scores"></ul>
            <button id="host-restart" style="display:none;" onclick="location.reload()">Nueva Partida</button>
            <button onclick="location.reload()">Salir</button>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
